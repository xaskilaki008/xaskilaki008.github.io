<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Мои соцсети</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #f5f7fb;
      --card: rgba(255, 255, 255, 0.88);
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
      --border: rgba(15, 23, 42, 0.08);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, #ffffff 0%, #eef4ff 38%, transparent 60%),
        radial-gradient(circle at bottom right, #e9f1ff 0%, #f7faff 32%, transparent 55%),
        var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      padding: 36px 28px 28px;
      text-align: center;
    }

    .avatar {
      width: 124px;
      height: 124px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      margin: 0 auto 18px;
      border: 4px solid white;
      box-shadow: 0 10px 25px rgba(37, 99, 235, 0.18);
      background: #e5e7eb;
    }

    h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 10px 0 28px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.5;
    }

    .links {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 14px;
    }

    .links a {
      display: block;
      text-decoration: none;
      color: var(--text);
      background: white;
      border: 1px solid rgba(15, 23, 42, 0.06);
      border-radius: 18px;
      padding: 16px 18px;
      font-size: 17px;
      font-weight: 600;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.05);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .links a:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(15, 23, 42, 0.08);
      border-color: rgba(37, 99, 235, 0.22);
    }

    .donate a {
      background: linear-gradient(135deg, #2563eb, #3b82f6);
      color: white;
      border: none;
      box-shadow: 0 14px 30px rgba(37, 99, 235, 0.24);
    }

    .donate a:hover {
      background: linear-gradient(135deg, #1d4ed8, #2563eb);
    }

    .home-link {
      margin-top: 24px;
    }

    .home-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .home-link a:hover {
      color: var(--accent-hover);
      text-decoration: underline;
    }

    @media (max-width: 560px) {
      .card {
        padding: 28px 18px 22px;
        border-radius: 24px;
      }

      .avatar {
        width: 104px;
        height: 104px;
      }

      h1 {
        font-size: 28px;
      }

      .links a {
        font-size: 16px;
        padding: 15px 16px;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <img src="avatar.png" alt="Аватар" class="avatar" />

    <h1>Мои соцсети</h1>
    <p class="subtitle">
      Быстрые ссылки на мои профили и страницу для поддержки
    </p>

    <ul class="links">
      <li><a href="https://t.me/xaskilaki007" target="_blank">Telegram</a></li>
      <li><a href="https://www.instagram.com/petromarin/" target="_blank">Instagram</a></li>
      <li><a href="https://vk.com/prestolsuda" target="_blank">VK</a></li>
      <li><a href="https://github.com/xaskilaki008" target="_blank">GitHub</a></li>
      <li class="donate"><a href="https://ko-fi.com/petyakapchauchit8" target="_blank">Поддержать деньгами</a></li>
    </ul>

    <p class="home-link">
      <a href="../index.html">← На главную</a>
    </p>
  </main>
</body>
</html>
