<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Страница не найдена</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }

    .box {
      max-width: 500px;
      padding: 40px 24px;
    }

    h1 {
      font-size: 72px;
      margin: 0 0 10px;
    }

    p {
      color: #bdbdbd;
      margin-bottom: 24px;
      font-size: 18px;
    }

    a {
      display: inline-block;
      padding: 12px 20px;
      background: white;
      color: black;
      text-decoration: none;
      border-radius: 12px;
      font-weight: bold;
    }

    a:hover {
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>404</h1>
    <p>Ты залетел не туда. Такой страницы нет.</p>
    <a href="/">Вернуться на главную</a>
  </div>
</body>
</html>
